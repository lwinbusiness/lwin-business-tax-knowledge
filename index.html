<title>Lwin Business Tax Knowledge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0b2d5c;
padding:25px;
text-align:center;
color:white;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

header img{
width:130px;
height:130px;
border-radius:50%;
background:white;
padding:8px;
margin-bottom:15px;
}

header h1{
font-size:36px;
}

header p{
margin-top:10px;
opacity:.9;
}

.container{
max-width:1000px;
margin:50px auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
color:#0b2d5c;
margin-bottom:15px;
}

.card p{
color:#666;
margin-bottom:25px;
}

.btn{
display:inline-block;
background:#0077ff;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
background:#005fd1;
}

footer{
margin-top:60px;
padding:20px;
text-align:center;
background:#0b2d5c;
color:white;
}

</style>
